<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Bhavya Tech</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .login-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d6efd, #1e1e2f);
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 10px;
            color: #0d6efd;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #0b5ed7;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="login-container">
    <div class="login-box">

        <div class="logo">Bhavya Tech</div>

        <h2>Admin Login</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <!-- ✅ ERROR MESSAGE -->
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

    </div>
</div>

</body>
</html>
