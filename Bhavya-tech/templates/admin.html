<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard - Bhavya Tech</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial, sans-serif;
        }

        .admin-container {
            padding: 40px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .admin-header h2 {
            color: #0d6efd;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #dc3545;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .logout-btn:hover {
            background: #bb2d3b;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            flex: 1;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
            color: #0d6efd;
        }

        .search-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #0d6efd;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f1f5ff;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            padding: 6px 10px;
            border-radius: 5px;
            text-decoration: none;
        }

        .delete-btn:hover {
            background: #bb2d3b;
        }
    </style>
</head>

<body>

<div class="admin-container">

    <!-- Header -->
    <div class="admin-header">
        <h2>📊 Admin Dashboard</h2>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="card">
            <h3>Total Requests</h3>
            <p>{{ data|length }}</p>
        </div>

        <div class="card">
            <h3>Status</h3>
            <p>Active</p>
        </div>
    </div>

    <!-- Search -->
    <div class="search-box">
        <input type="text" placeholder="Search client..." onkeyup="searchTable(this)">
    </div>

    <!-- Table -->
    <table id="clientTable">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Mobile</th>
            <th>Message</th>
            <th>Action</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>
                <a href="/delete/{{ row[0] }}" class="delete-btn"
                   onclick="return confirm('Delete this request?')">
                   Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

<script>
function searchTable(input) {
    let filter = input.value.toLowerCase();
    let rows = document.querySelectorAll("#clientTable tr");

    rows.forEach((row, index) => {
        if(index === 0) return;
        let text = row.innerText.toLowerCase();
        row.style.display = text.includes(filter) ? "" : "none";
    });
}
</script>

</body>
</html>
